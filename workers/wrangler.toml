name = "flutter-boilerplate-api"
main = "src/index.ts"
compatibility_date = "2024-05-12"

[triggers]
crons = [
  "0 3 * * 5",
  "0 3 * * 6",
]

[[d1_databases]]
binding = "DB"
database_name = "app-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "app-backups"

[vars]
ENVIRONMENT = "production"

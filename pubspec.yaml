name: flutter_boilerplate
description: Flutter 1인개발 보일러플레이트
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # 상태관리
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0
  # 로컬 DB
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # 라우팅
  go_router: ^14.0.0
  # 구독
  purchases_flutter: ^9.14.0
  # 광고
  google_mobile_ads: ^5.0.0
  # 분석 & 푸시
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  # UI
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  # 백업
  google_sign_in: ^6.2.0
  # 네트워크
  http: ^1.2.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0
  drift_dev: ^2.28.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

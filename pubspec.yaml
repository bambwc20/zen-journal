name: flutter_boilerplate
description: Flutter 1인개발 보일러플레이트
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # 상태관리
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0
  # 로컬 DB (SQLCipher 암호화)
  drift: ^2.28.0
  sqlite3: ^2.7.0
  sqlcipher_flutter_libs: ^0.6.8
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # 라우팅
  go_router: ^14.0.0
  # 구독
  purchases_flutter: ^9.14.0
  # 광고
  google_mobile_ads: ^5.3.0
  # 분석 & 푸시
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  # UI
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.0
  intl: ^0.20.0
  # 백업
  google_sign_in: ^6.2.0
  # 네트워크
  http: ^1.2.0
  # ZenJournal — 리치 텍스트 에디터
  flutter_quill: ^11.5.0
  # ZenJournal — 이미지 첨부
  image_picker: ^1.0.0
  # ZenJournal — 차트 & 캘린더
  fl_chart: ^0.70.0
  table_calendar: ^3.1.0
  # ZenJournal — 타이포그래피
  google_fonts: ^6.0.0
  # ZenJournal — 인앱 리뷰
  in_app_review: ^2.0.0
  # ZenJournal — 타임존 (알림 스케줄링)
  timezone: ^0.9.0
  # ZenJournal — 음성 입력 (STT)
  speech_to_text: ^7.3.0
  share_plus: ^12.0.1
  connectivity_plus: ^7.0.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0
  drift_dev: ^2.28.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prompts.json

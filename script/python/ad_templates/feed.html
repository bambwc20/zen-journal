<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
body {
  width: {{WIDTH}}px;
  height: {{HEIGHT}}px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: {{PADDING}};
  text-align: center;
}
.headline {
  font-size: {{FONT_SIZE_HEADLINE}}px;
  font-weight: 800;
  color: var(--color-text-light);
  line-height: 1.15;
  max-width: 90%;
}
.subtext {
  font-size: {{FONT_SIZE_SUB}}px;
  color: var(--color-secondary);
  font-weight: 600;
  max-width: 85%;
}
.phone-area {
  position: relative;
  width: {{PHONE_W}}px;
  height: {{PHONE_H}}px;
}
.phone-mockup-css {
  width: 100%;
  height: 100%;
}
.phone-mockup-css .screen {
  border-radius: {{SCREEN_RADIUS}}px;
}
.phone-mockup-css .notch {
  height: {{NOTCH_H}}px;
}
.bottom-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 90%;
  justify-content: center;
}
.bottom-bar .app-icon { width: {{BOTTOM_ICON}}px; height: {{BOTTOM_ICON}}px; }
.bottom-bar .app-name {
  font-size: {{FONT_SIZE_APPNAME}}px;
  color: var(--color-text-light);
  font-weight: 700;
}
.cta-button {
  font-size: {{FONT_SIZE_CTA}}px;
  padding: {{CTA_PADDING}};
}
</style>
</head><body>
  <div class="headline">{{HEADLINE}}</div>
  <div class="subtext" style="display:{{SHOW_SUBTEXT}}">{{SUBTEXT}}</div>
  <div class="phone-area" style="display:{{SHOW_PHONE}}">
    <div class="phone-mockup-css">
      <div class="notch"></div>
      <img class="screen" src="{{SCREENSHOT_PATH}}" alt="app">
    </div>
  </div>
  <div class="bottom-bar">
    <img class="app-icon" src="{{ICON_PATH}}" alt="icon">
    <span class="app-name">{{APP_NAME}}</span>
    <div class="cta-button">{{CTA}}</div>
  </div>
</body></html>
